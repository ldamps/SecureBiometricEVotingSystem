services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evoting_app}
      # Non-empty default so `docker compose up` works without a root `.env`; override in production.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evoting_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-evoting_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Host 5433 avoids clashing with a local Postgres on 5432; backend still uses db:5432 on the compose network.
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      # pg_isready defaults the DB name to the username; our DB is POSTGRES_DB (evoting_db).
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evoting_app} -d ${POSTGRES_DB:-evoting_db}"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-evoting_app}:${POSTGRES_PASSWORD:-evoting_local_dev}@db:5432/${POSTGRES_DB:-evoting_db}
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://localhost:8088,http://frontend"
      REQUIRE_GATEWAY: "true"
    depends_on:
      db:
        condition: service_healthy
    # Port 8000 is NOT exposed to the host – only reachable via gateway
    expose:
      - "8000"
    restart: unless-stopped

  gateway:
    build: ./gateway
    depends_on:
      - backend
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      # Use 127.0.0.1: in this image `localhost` can resolve to ::1 while nginx listens on IPv4 only.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/gateway/health || exit 1"]
      interval: 10s
      retries: 3

  frontend:
    build: ./frontend
    depends_on:
      gateway:
        condition: service_healthy
    # Host 8088 avoids clashing with another service bound to 80 (e.g. system nginx/apache).
    ports:
      - "8088:80"
    restart: unless-stopped

volumes:
  postgres_data:
