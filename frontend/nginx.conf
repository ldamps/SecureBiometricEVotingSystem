# Frontend Nginx – serves the React SPA and proxies /api → API gateway
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide server version
    server_tokens off;

    # ── Security headers for static assets ────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"              always;
    add_header X-Frame-Options         "DENY"                 always;
    add_header X-XSS-Protection        "1; mode=block"        always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(self), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Proxy API calls to the API gateway ────────────────────────────────
    location /api/ {
        proxy_pass         http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts aligned with gateway
        proxy_connect_timeout  10s;
        proxy_read_timeout     30s;
        proxy_send_timeout     30s;
    }

    # ── Backend health passthrough ────────────────────────────────────────
    location = /health {
        proxy_pass http://gateway:8080;
    }

    # ── Static assets (cache-busted by CRA hashes) ───────────────────────
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback: serve index.html for client-side routes ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny access to hidden / sensitive files ───────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
