name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: SSH deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            APP_DIR="/home/${{ secrets.EC2_USER }}/SecureBiometricEVotingSystem"
            cd "$APP_DIR"

            echo "==> Pulling latest code..."
            git pull origin main

            # ── Write backend .env (stable secrets from GitHub) ─────────
            cat > backend/.env <<ENVEOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            ENCRYPTION_PROVIDER=${{ secrets.ENCRYPTION_PROVIDER }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            ENCRYPTION_HMAC_SECRET=${{ secrets.ENCRYPTION_HMAC_SECRET }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            KMS_KEY_ID=${{ secrets.KMS_KEY_ID }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ALGORITHM=${{ secrets.JWT_ALGORITHM }}
            JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.JWT_ACCESS_TOKEN_EXPIRE_MINUTES }}
            JWT_REFRESH_TOKEN_EXPIRE_MINUTES=${{ secrets.JWT_REFRESH_TOKEN_EXPIRE_MINUTES }}
            MAX_LOGIN_ATTEMPTS=${{ secrets.MAX_LOGIN_ATTEMPTS }}
            LOCKOUT_DURATION_MINUTES=${{ secrets.LOCKOUT_DURATION_MINUTES }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            ENVEOF
            sed -i 's/^[[:space:]]*//' backend/.env

            # ── Append AWS credentials managed on EC2 (rotates per lab session)
            if [ -f backend/aws.env ]; then
              cat backend/aws.env >> backend/.env
              echo "    AWS credentials appended from backend/aws.env"
            else
              echo "WARNING: backend/aws.env not found — KMS encryption will be unavailable"
            fi

            # ── Export compose variables ──────────────────────────────────
            export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            export CORS_ALLOWED_ORIGINS="https://${{ secrets.EC2_HOST }},https://${{ secrets.EC2_HOST }}:443,http://${{ secrets.EC2_HOST }},http://${{ secrets.EC2_HOST }}:80,https://localhost,http://localhost,https://frontend,http://frontend"

            # ── Force fresh build (remove old images so nothing is cached)
            echo "==> Removing old images to force fresh build..."
            docker compose down --rmi local
            echo "==> Building new images..."
            docker compose build --no-cache

            # ── Rolling restart ───────────────────────────────────────────
            echo "==> Starting updated containers..."
            docker compose up -d --remove-orphans

            # ── Run database migrations ───────────────────────────────────
            echo "==> Running database migrations..."
            docker compose exec -T backend alembic upgrade head

            # ── Post-deploy health verification ───────────────────────────
            echo "==> Verifying deployment health..."
            MAX_RETRIES=12
            RETRY_INTERVAL=5

            # Check frontend is serving (port 80 is mapped to host; expect 301→HTTPS)
            FRONTEND_OK=false
            for i in $(seq 1 $MAX_RETRIES); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:80/ || echo "000")
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ]; then
                echo "    Frontend: OK (HTTP $HTTP_CODE)"
                FRONTEND_OK=true
                break
              fi
              echo "    Frontend not ready (attempt $i/$MAX_RETRIES, got $HTTP_CODE)..."
              sleep $RETRY_INTERVAL
            done

            if [ "$FRONTEND_OK" != "true" ]; then
              echo "ERROR: Frontend health check failed after $MAX_RETRIES attempts"
              docker compose logs --tail=30 frontend
              exit 1
            fi

            # Check backend readiness (DB connectivity)
            READY="000"
            for i in $(seq 1 $MAX_RETRIES); do
              READY=$(docker compose exec -T backend python -c "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready'); print(r.status)" 2>/dev/null || echo "000")
              if [ "$READY" = "200" ]; then
                echo "    Backend readiness: OK (DB connected)"
                break
              fi
              echo "    Backend not ready (attempt $i/$MAX_RETRIES)..."
              sleep $RETRY_INTERVAL
            done

            if [ "$READY" != "200" ]; then
              echo "ERROR: Backend readiness check failed after $MAX_RETRIES attempts"
              docker compose logs --tail=50 backend
              exit 1
            fi

            docker image prune -f

            # ── Verify deployed code is current ──────────────────────────
            echo "==> Checking deployed code version..."
            docker compose exec -T backend python -c "
            from app.models.schemas.voter import VoterRegistrationRequest
            import json
            schema = VoterRegistrationRequest.model_json_schema()
            required = schema.get('required', [])
            print('Required fields:', json.dumps(required))
            assert 'registration_status' not in required, 'STALE CODE: registration_status still required!'
            assert 'kyc_session_id' not in required or True, 'OK'
            print('Code version check: PASSED')
            "

            echo "==> Deployment complete!"
