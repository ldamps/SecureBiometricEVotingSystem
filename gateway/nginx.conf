# ===========================================================================
# API Gateway – Nginx reverse-proxy sitting between frontend and backend
# Responsibilities:
#   • Rate limiting (per-IP)
#   • Request body size cap
#   • Security headers (OWASP baseline)
#   • Upstream health checks
#   • Logging
# ===========================================================================

# ── Rate-limit zones ──────────────────────────────────────────────────────
# General API: 10 req/s per IP, small burst
limit_req_zone $binary_remote_addr zone=api_general:10m  rate=10r/s;

# Auth / registration: stricter – 3 req/s per IP
limit_req_zone $binary_remote_addr zone=api_auth:10m     rate=3r/s;

# Voting endpoints: 2 req/s per IP (one vote at a time)
limit_req_zone $binary_remote_addr zone=api_voting:10m   rate=2r/s;

# ── Upstream ──────────────────────────────────────────────────────────────
upstream backend {
    server backend:8000;
    keepalive 32;                       # connection pooling
}

# ── Server ────────────────────────────────────────────────────────────────
server {
    listen 8080;
    server_name _;

    # ── Global defaults ───────────────────────────────────────────────────
    client_max_body_size      5m;       # cap uploads at 5 MB
    client_body_timeout       15s;
    client_header_timeout     15s;
    send_timeout              30s;
    proxy_connect_timeout     10s;
    proxy_read_timeout        30s;
    proxy_send_timeout        30s;

    # Hide upstream server identity
    proxy_hide_header X-Powered-By;
    server_tokens off;

    # ── Common proxy settings ─────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";          # enable keepalive

    # ── Security headers (applied to every proxied response) ──────────────
    add_header X-Content-Type-Options   "nosniff"              always;
    add_header X-Frame-Options          "DENY"                 always;
    add_header X-XSS-Protection         "1; mode=block"        always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Cache-Control            "no-store"             always;
    add_header Pragma                   "no-cache"             always;

    # ── Health check (gateway itself) ─────────────────────────────────────
    location = /gateway/health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── Auth endpoints (strict rate limit) ────────────────────────────────
    location /api/v1/auth {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
    }

    # ── Voter registration (strict rate limit) ────────────────────────────
    location /api/v1/voter/register {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
    }

    # ── Voting endpoints (strict rate limit) ──────────────────────────────
    location /api/v1/voting {
        limit_req zone=api_voting burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
    }

    # ── All other API routes (general rate limit) ─────────────────────────
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
    }

    # ── Backend health (passthrough, no rate limit) ───────────────────────
    location = /health {
        proxy_pass http://backend;
    }

    # ── Catch-all: reject anything not routed ─────────────────────────────
    location / {
        return 404 '{"error":"not_found","message":"Route not found on API gateway"}';
        add_header Content-Type application/json;
    }
}
